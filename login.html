<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Admin Login — ZEUS IOT</title>
<meta name="description" content="Zeus IOT Admin Panel — Secure login for authorized administrators."/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared-styles.css?v=5"/>
<link rel="stylesheet" href="wow-styles.css?v=1"/>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="zeus.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070c1e">
<script src="mobile-enhancements.js"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface-dim":"#080A0A","on-tertiary-fixed":"#022c22","tertiary":"#10B981",
        "on-surface-variant":"#c6c6cd","on-error-container":"#ffdad6",
        "surface-container-highest":"#1d1f1d","outline":"#7a807a","background":"#080A0A",
        "surface-container":"#111311","inverse-primary":"#565e74","primary-fixed-dim":"#bec6e0",
        "surface-container-high":"#161816","inverse-on-surface":"#2d3133",
        "on-primary-container":"#798098","secondary-fixed-dim":"#f9bd22",
        "primary-container":"#0f172a","tertiary-container":"#064e3b","surface-tint":"#bec6e0",
        "on-tertiary":"#ffffff","on-tertiary-container":"#a7f3d0","on-primary-fixed":"#131b2e",
        "on-tertiary-fixed-variant":"#047857","on-surface":"#e0e3e5",
        "surface-container-low":"#0d0f0d","surface-container-lowest":"#050605",
        "primary":"#bec6e0","tertiary-fixed-dim":"#10B981","outline-variant":"#272927",
        "surface":"#080A0A","inverse-surface":"#e0e3e5","surface-variant":"#323537",
        "on-secondary-fixed-variant":"#5c4300","error":"#ffb4ab","tertiary-fixed":"#a7f3d0",
        "primary-fixed":"#dae2fd","surface-bright":"#222422","on-secondary-container":"#5a4100",
        "on-primary-fixed-variant":"#3f465c","on-primary":"#283044","on-background":"#e0e3e5",
        "secondary-container":"#e3aa00","on-error":"#690005","on-secondary-fixed":"#261a00",
        "secondary-fixed":"#ffdf9f","secondary":"#ffc640","error-container":"#93000a",
        "on-secondary":"#402d00"
      },
      borderRadius:{DEFAULT:"0.125rem",lg:"0.25rem",xl:"0.5rem",full:"0.75rem"},
      spacing:{unit:"8px","container-max":"1280px","margin-mobile":"16px","margin-desktop":"64px",gutter:"24px"},
      fontFamily:{"body-lg":["Inter"],"headline-xl":["Montserrat"],"headline-lg-mobile":["Montserrat"],"code-sm":["JetBrains Mono"],"headline-md":["Montserrat"],"headline-lg":["Montserrat"],"label-caps":["JetBrains Mono"],"body-md":["Inter"]},
      fontSize:{
        "body-lg":["18px",{lineHeight:"1.6",fontWeight:"400"}],
        "headline-xl":["48px",{lineHeight:"1.1",letterSpacing:"-0.02em",fontWeight:"800"}],
        "headline-lg-mobile":["28px",{lineHeight:"1.2",fontWeight:"700"}],
        "code-sm":["14px",{lineHeight:"1.4",fontWeight:"400"}],
        "headline-md":["24px",{lineHeight:"1.3",fontWeight:"600"}],
        "headline-lg":["32px",{lineHeight:"1.2",letterSpacing:"-0.01em",fontWeight:"700"}],
        "label-caps":["12px",{lineHeight:"1.0",letterSpacing:"0.1em",fontWeight:"700"}],
        "body-md":["16px",{lineHeight:"1.5",fontWeight:"400"}]
      }
    }
  }
}
</script>
<style>
body {
  background-color: #080A0A;
  background-image: radial-gradient(circle at center, rgba(16,185,129,0.08) 0%, transparent 60%);
  min-height: 100vh;
}
.glass-panel {
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(16, 185, 129, 0.15);
  border-top: 1px solid rgba(16, 185, 129, 0.25);
  border-left: 1px solid rgba(255, 198, 64, 0.15);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}
.glow-text { text-shadow: 0 0 8px rgba(255,198,64,0.4); }

/* Input field with float-label style */
.login-input-group { position: relative; margin-bottom: 0; }
.login-input {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(16,185,129,0.2);
  color: #e0e3e5;
  transition: all 0.3s ease;
  padding: 16px 14px 8px;
  width: 100%;
  border-radius: 4px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
}
.login-input:focus {
  border-color: #10B981;
  box-shadow: 0 0 0 3px rgba(16,185,129,0.1), 0 0 15px rgba(16,185,129,0.15);
  outline: none;
}
.login-input-label {
  position: absolute; top: 14px; left: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.1em; font-weight: 700;
  color: #909097; text-transform: uppercase;
  transition: all 0.25s ease; pointer-events: none;
}
.login-input:focus ~ .login-input-label,
.login-input:not(:placeholder-shown) ~ .login-input-label {
  top: 5px; font-size: 9px; color: #10B981;
}

/* Password strength */
.strength-bar {
  height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.1);
  overflow: hidden; transition: all 0.3s ease;
}
.strength-fill {
  height: 100%; border-radius: 2px;
  transition: width 0.4s ease, background-color 0.4s ease;
  width: 0%;
}

/* SVG Lightning bolts in background */
@keyframes bgBoltFlash {
  0%, 90%, 100% { opacity: 0; }
  92%, 98% { opacity: 0.08; }
}
.bg-bolt { animation: bgBoltFlash 6s ease-in-out infinite; }
.bg-bolt-2 { animation: bgBoltFlash 9s ease-in-out 3s infinite; }
.bg-bolt-3 { animation: bgBoltFlash 7s ease-in-out 1.5s infinite; }

/* Success animation */
@keyframes successPop {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.success-icon { animation: successPop 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }

/* Success checkmark path draw */
@keyframes checkStroke {
  0% { stroke-dashoffset: 50; }
  100% { stroke-dashoffset: 0; }
}
</style>
</head>
<body class="text-on-surface antialiased font-body-lg circuit-bg flex items-center justify-center min-h-screen relative overflow-hidden">

  <!-- ─── Background Lightning Bolts ─── -->
  <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" style="z-index:0;">
    <!-- Bolt 1 (top left) -->
    <path class="bg-bolt" d="M200 50 L160 220 H195 L148 400 L260 170 H220 L240 50Z" fill="#ffc640"/>
    <!-- Bolt 2 (bottom right) -->
    <path class="bg-bolt-2" d="M1050 400 L1010 570 H1045 L998 750 L1110 520 H1070 L1090 400Z" fill="#10B981"/>
    <!-- Bolt 3 (center right) -->
    <path class="bg-bolt-3" d="M900 100 L875 220 H898 L865 330 L935 200 H908 L920 100Z" fill="#ffc640"/>
  </svg>

  <!-- Ambient Glows -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-tertiary/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/5 rounded-full blur-[120px] pointer-events-none -z-10"></div>

  <!-- Particle Canvas -->
  <canvas id="login-particles" class="absolute inset-0 pointer-events-none" style="z-index:0;opacity:0.3;"></canvas>

  <div class="w-full max-w-md px-4 relative z-10">
    <div class="glass-panel rounded-xl p-8 flex flex-col relative overflow-hidden">
      <!-- Top Neon Line -->
      <div class="absolute top-0 left-0 right-0 h-0.5 bg-gradient-to-r from-tertiary to-secondary"></div>

      <!-- Brand Title -->
      <div class="flex flex-col items-center gap-2 mb-8">
        <div class="w-14 h-14 rounded-full bg-secondary/10 flex items-center justify-center border border-secondary/30 animate-neon-gold relative">
          <span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
          <!-- Orbit ring -->
          <div class="absolute -inset-2 rounded-full border border-tertiary/20 animate-[spin_8s_linear_infinite]"></div>
        </div>
        <h1 class="font-headline-xl text-headline-md text-secondary glow-text tracking-tighter uppercase mt-2">ZEUS IOT</h1>
        <p class="font-code-sm text-xs text-on-surface-variant uppercase tracking-widest">Admin Authorization Required</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="flex flex-col gap-5">
        <!-- Error Alert -->
        <div id="error-container" class="hidden bg-error-container/20 border border-error/30 text-error text-sm p-3 rounded flex items-center gap-2 animate-slide-up">
          <span class="material-symbols-outlined text-[18px]">error</span>
          <span id="error-message">Invalid username or password.</span>
        </div>

        <!-- Username -->
        <div>
          <div class="login-input-group relative">
            <input id="username" class="login-input pr-12" type="text" placeholder=" " required autocomplete="username"/>
            <label class="login-input-label" for="username">Username</label>
          </div>
        </div>

        <!-- Password -->
        <div>
          <div class="login-input-group relative">
            <input id="password" class="login-input pr-12" type="password" placeholder=" " required autocomplete="current-password"/>
            <label class="login-input-label" for="password">Password</label>
            <!-- Show/Hide toggle -->
            <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-tertiary transition-colors">
              <span class="material-symbols-outlined text-[20px]" id="eye-icon">visibility</span>
            </button>
          </div>
          <!-- Password Strength Bar -->
          <div class="strength-bar mt-2">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <div class="font-code-sm text-[10px] text-outline mt-1" id="strength-label"></div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="login-btn" class="btn-thunderbolt w-full py-4 mt-2 font-headline-md text-[18px] uppercase tracking-widest flex items-center justify-center gap-2 relative">
          <span id="login-label">Sign In</span>
          <span class="material-symbols-outlined" id="login-icon">login</span>
        </button>
      </form>

      <!-- Back Home link -->
      <div class="text-center mt-6">
        <a href="index.html" class="inline-flex items-center gap-1.5 text-xs font-code-sm text-on-surface-variant hover:text-tertiary transition-colors">
          <span class="material-symbols-outlined text-xs">arrow_back</span>
          RETURN TO HOME
        </a>
      </div>

      <!-- Security indicator -->
      <div class="flex items-center justify-center gap-2 mt-4">
        <span class="material-symbols-outlined text-tertiary text-[14px]">lock</span>
        <span class="font-code-sm text-[10px] text-on-surface-variant uppercase tracking-widest">End-to-End Encrypted</span>
      </div>
    </div>
  </div>

  <script>
    // ─── Particle system (desktop only — skip on touch to save battery) ───
    if (!window.matchMedia('(hover: none)').matches) {
      const lCanvas = document.getElementById('login-particles');
      const lCtx = lCanvas.getContext('2d');
      lCanvas.width = window.innerWidth;
      lCanvas.height = window.innerHeight;
      window.addEventListener('resize', () => { lCanvas.width = window.innerWidth; lCanvas.height = window.innerHeight; });
      const lParticles = [];
      class LP {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * lCanvas.width; this.y = Math.random() * lCanvas.height;
          this.size = Math.random() * 1.5 + 0.5; this.sx = (Math.random()-.5)*.2; this.sy = (Math.random()-.5)*.2;
          this.opacity = Math.random()*.3+.05; this.color = Math.random()>.5?'16,185,129':'255,198,64';
        }
        update() { this.x+=this.sx; this.y+=this.sy; if(this.x<0||this.x>lCanvas.width||this.y<0||this.y>lCanvas.height) this.reset(); }
        draw() { lCtx.beginPath(); lCtx.arc(this.x,this.y,this.size,0,Math.PI*2); lCtx.fillStyle=`rgba(${this.color},${this.opacity})`; lCtx.fill(); }
      }
      for(let i=0;i<40;i++) lParticles.push(new LP());
      function animLP() { lCtx.clearRect(0,0,lCanvas.width,lCanvas.height); lParticles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animLP); }
      animLP();
    }

    // ─── Redirect if already logged in ───
    const token = localStorage.getItem('zeus_admin_token');
    if (token) {
      fetch('/api/auth/verify', { headers: { 'Authorization': `Bearer ${token}` } })
        .then(res => { if (res.ok) window.location.href = 'admin.html'; });
    }

    // ─── Password visibility toggle ───
    document.getElementById('toggle-password').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.textContent = 'visibility_off'; }
      else { pwd.type = 'password'; icon.textContent = 'visibility'; }
    });

    // ─── Password strength indicator ───
    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const configs = [
        { pct: '0%', color: 'transparent', text: '' },
        { pct: '20%', color: '#ef4444', text: 'Weak' },
        { pct: '40%', color: '#f97316', text: 'Fair' },
        { pct: '60%', color: '#eab308', text: 'Good' },
        { pct: '80%', color: '#22c55e', text: 'Strong' },
        { pct: '100%', color: '#10B981', text: 'Very Strong' },
      ];
      const cfg = configs[Math.min(strength, 5)];
      fill.style.width = cfg.pct;
      fill.style.backgroundColor = cfg.color;
      label.textContent = cfg.text;
      label.style.color = cfg.color;
    });

    // ─── Form Submit ───
    const form = document.getElementById('login-form');
    const errorContainer = document.getElementById('error-container');
    const errorMessage = document.getElementById('error-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorContainer.classList.add('hidden');

      const btn = document.getElementById('login-btn');
      const lLabel = document.getElementById('login-label');
      const lIcon = document.getElementById('login-icon');

      btn.classList.add('btn-loading');
      lLabel.textContent = 'VERIFYING...';
      lIcon.textContent = 'autorenew';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Login failed.');

        // Success animation
        btn.classList.remove('btn-loading');
        lLabel.textContent = 'ACCESS GRANTED';
        lIcon.textContent = 'check_circle';
        btn.style.background = 'linear-gradient(135deg,#4ade80,#22c55e)';

        localStorage.setItem('zeus_admin_token', data.token);
        localStorage.setItem('zeus_admin_user', data.username);

        setTimeout(() => { window.location.href = 'admin.html'; }, 800);

      } catch (err) {
        btn.classList.remove('btn-loading');
        lLabel.textContent = 'Sign In';
        lIcon.textContent = 'login';
        btn.style.background = '';

        errorMessage.textContent = err.message;
        errorContainer.classList.remove('hidden');
        // Shake animation
        btn.style.animation = 'none';
        btn.style.transform = 'translateX(-5px)';
        setTimeout(() => { btn.style.transform = 'translateX(5px)'; }, 100);
        setTimeout(() => { btn.style.transform = ''; }, 200);
      }
    });
  </script>
</body>
</html>
