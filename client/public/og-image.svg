<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#070c1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="85%" cy="90%" r="70%">
      <stop offset="0%" stop-color="#e5a93c" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#070c1e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e5a93c"/>
      <stop offset="50%" stop-color="#f9bd22"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
    <pattern id="circuit" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M10 10 h20 v15 h15 v20" stroke="#ffffff" stroke-opacity="0.04" fill="none" stroke-width="1"/>
      <circle cx="30" cy="25" r="2" fill="#00d2ff" fill-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#070c1e"/>
  <rect width="1200" height="630" fill="url(#circuit)"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Status badge -->
  <rect x="80" y="150" width="290" height="44" rx="22" fill="#e5a93c" fill-opacity="0.1" stroke="#e5a93c" stroke-opacity="0.3"/>
  <circle cx="106" cy="172" r="6" fill="#e5a93c"/>
  <text x="124" y="178" font-family="monospace" font-size="16" letter-spacing="3" fill="#e5a93c">SYSTEM STATUS: OPTIMAL</text>

  <!-- Headline -->
  <text x="80" y="290" font-family="Montserrat, Arial, sans-serif" font-size="76" font-weight="800" fill="#e0e3e5" letter-spacing="-1">HARNESS THE BOLT</text>
  <text x="80" y="370" font-family="Montserrat, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#grad)" letter-spacing="-1">CUSTOM IOT &amp; SOFTWARE</text>

  <!-- Subtext -->
  <text x="80" y="430" font-family="Inter, Arial, sans-serif" font-size="26" fill="#c6c6cd">Engineered for the next generation. Don't just buy — learn.</text>

  <!-- Bottom brand -->
  <path d="M 92 516 L 80 542 L 90 542 L 84 562 L 104 534 L 94 534 Z" fill="#e5a93c"/>
  <text x="116" y="540" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="700" fill="#e5a93c" letter-spacing="4">ZEUS IOT</text>
  <text x="116" y="570" font-family="monospace" font-size="16" fill="#4f6190">zeus.org.in</text>

  <!-- Decorative bolt circle -->
  <circle cx="1000" cy="315" r="160" fill="none" stroke="#00d2ff" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="1000" cy="315" r="190" fill="none" stroke="#e5a93c" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="6 8"/>
  <path d="M 1020 230 L 960 330 L 1000 330 L 980 400 L 1050 290 L 1005 290 Z" fill="url(#grad)"/>
</svg>
