services:
  - type: web
    name: zeus-iot
    env: node
    # Build the React client (needs dev deps for Vite), then install the tiny static server.
    # --include=dev forces Vite/build tooling to install even though NODE_ENV=production.
    buildCommand: "cd client && npm install --include=dev && npm run build && cd ../server && npm install"
    startCommand: "cd server && node server.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
